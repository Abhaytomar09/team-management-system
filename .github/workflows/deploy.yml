name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  deploy-backend-render:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:

    - uses: actions/checkout@v3

    - name: Deploy Backend to Render
      run: |
        curl https://api.render.com/deploy/srv-${{ secrets.RENDER_BACKEND_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

  deploy-frontend-vercel:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:

    - uses: actions/checkout@v3

    - name: Deploy Frontend to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'

  deploy-kubernetes:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:

    - uses: actions/checkout@v3

    - name: Update Kubernetes Manifests with Latest Image
      run: |
        sed -i "s|yourdockerhub/backend:latest|${{ secrets.DOCKER_USERNAME }}/backend:latest|g" k8s/backend-deployment.yaml
        sed -i "s|yourdockerhub/frontend:latest|${{ secrets.DOCKER_USERNAME }}/frontend:latest|g" k8s/frontend-deployment.yaml

    - name: Deploy to Kubernetes
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.24.0'

